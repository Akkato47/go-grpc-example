syntax = "proto3";

package metrics;

option go_package = "github.com/Akkato47/go-grpc-example/gen/metrics";

import "google/protobuf/timestamp.proto";

enum MetricType {
  GAUGE = 0;
  COUNTER = 1;
  HISTOGRAM = 2;
}

message Metric {
  string name = 1;
  double value = 2;
  map<string, string> labels = 3;
  google.protobuf.Timestamp timestamp = 4;
  MetricType type = 5;
}

message MetricBatch {
  string source = 1;
  repeated Metric metrics = 2;
  google.protobuf.Timestamp sent_at = 3;
}

message SendAck {
  int64 received = 1;
  int64 processed = 2;
  string status = 3;
  google.protobuf.Timestamp acked_at = 4;
}

service MetricsService {
  // Bidirectional streaming: generator sends batches, collector acks
  rpc SendMetrics(stream MetricBatch) returns (stream SendAck);
}
