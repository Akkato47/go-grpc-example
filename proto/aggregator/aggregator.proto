syntax = "proto3";

package aggregator;

option go_package = "github.com/Akkato47/go-grpc-example/gen/aggregator";

import "google/protobuf/timestamp.proto";

message Metric {
  string name = 1;
  double value = 2;
  map<string, string> labels = 3;
  google.protobuf.Timestamp timestamp = 4;
}

message SummaryRequest {
  string metric_name = 1;
  google.protobuf.Timestamp from = 2;
  google.protobuf.Timestamp to = 3;
}

message Summary {
  string metric_name = 1;
  double min = 2;
  double max = 3;
  double avg = 4;
  double p95 = 5;
  double p99 = 6;
  int64 count = 7;
  google.protobuf.Timestamp computed_at = 8;
}

message WatchRequest {
  repeated string metric_names = 1;
  int64 interval_ms = 2;
}

message MetricUpdate {
  string metric_name = 1;
  double value = 2;
  google.protobuf.Timestamp timestamp = 3;
  map<string, string> labels = 4;
}

message PushResponse {
  int64 accepted = 1;
}

service AggregatorService {
  // Unary: get statistical summary for a metric
  rpc GetSummary(SummaryRequest) returns (Summary);
  // Server-side streaming: watch live metric updates
  rpc WatchMetrics(WatchRequest) returns (stream MetricUpdate);
  // Client-side streaming: collector pushes metrics to aggregator
  rpc PushMetrics(stream Metric) returns (PushResponse);
}
