services:
  # ── gRPC services ──────────────────────────────────────────────────────────
  aggregator:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CMD: aggregator
    environment:
      AGGREGATOR_GRPC_PORT: "50052"
      AGGREGATOR_METRICS_PORT: "9092"
    ports:
      - "50052:50052"
      - "9092:9092"

  collector:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CMD: collector
    environment:
      COLLECTOR_GRPC_PORT: "50051"
      COLLECTOR_METRICS_PORT: "9091"
      AGGREGATOR_ADDR: "aggregator:50052"
    ports:
      - "50051:50051"
      - "9091:9091"
    depends_on:
      - aggregator

  generator:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CMD: generator
    environment:
      COLLECTOR_ADDR: "collector:50051"
      AGGREGATOR_ADDR: "aggregator:50052"
      GENERATOR_INTERVAL: "2s"
    depends_on:
      - collector
      - aggregator

  # ── Observability stack ────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - collector
      - aggregator

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
